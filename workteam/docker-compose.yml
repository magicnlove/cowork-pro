version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intranet-collab-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: postgresql://collab:collab_pw@postgres:5432/collab_db
      JWT_SECRET: change-me-to-a-long-random-secret-in-production
      REDIS_URL: redis://redis:6379
      FILE_STORAGE_ROOT: /app/storage/uploads
      DOCUMENT_EDITOR_BASE_URL: ""
      DOCUMENT_EDITOR_API_SECRET: ""
    ports:
      - "3000:3000"
    volumes:
      - app_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000 && exit 0 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - intranet_net

  postgres:
    image: postgres:16-alpine
    container_name: intranet-collab-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      POSTGRES_USER: collab
      POSTGRES_PASSWORD: collab_pw
      POSTGRES_DB: collab_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collab -d collab_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - intranet_net

  redis:
    image: redis:7-alpine
    container_name: intranet-collab-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - intranet_net

volumes:
  pg_data:
  redis_data:
  app_uploads:

networks:
  intranet_net:
    driver: bridge
